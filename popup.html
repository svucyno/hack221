<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Recommender AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Header -->
  <div class="fixed-header">
    <div class="header-content">
      <span class="header-icon">🎯</span>
      <div class="header-text">
        <h1>Job Recommender AI</h1>
        <p class="subtitle">Powered by Sentence Transformers + AI</p>
      </div>
    </div>
  </div>

  <!-- Main Content Wrapper -->
  <div class="main-content">
    
    <!-- Input View -->
    <div id="input-view" class="view">
      
      <!-- Mode Toggle Bar -->
      <div class="mode-toggle">
        <button id="mode-auto" class="mode-btn active">🔍 Auto Extract</button>
        <button id="mode-manual" class="mode-btn">✍️ Manual Input</button>
      </div>

      <!-- Auto Extract Section -->
      <div id="auto-section" class="section">
        <p class="platform-hint">Works best on LinkedIn & GitHub profile pages.</p>
        <button id="btn-analyze" class="btn-primary">⚡ Analyze Profile</button>
        <button id="btn-load-cached" class="btn-secondary hidden">📂 Load Previous Results</button>
        <div id="cached-info" class="cached-info hidden"></div>
      </div>

      <!-- Manual Input Section -->
      <div id="manual-section" class="section hidden">
        <div class="input-group">
          <label>Skills <small>(comma separated)</small></label>
          <input type="text" id="manual-skills" placeholder="e.g. Python, Machine Learning">
        </div>
        <div class="input-group">
          <label>Projects</label>
          <textarea id="manual-projects" rows="2" placeholder="Brief project descriptions..."></textarea>
        </div>
        <div class="input-group">
          <label>Education</label>
          <input type="text" id="manual-education" placeholder="e.g. BS Computer Science">
        </div>
        <div class="input-group">
          <label>Certifications</label>
          <input type="text" id="manual-certs" placeholder="e.g. AWS Solutions Architect">
        </div>
        <button id="btn-submit-manual" class="btn-primary">🚀 Generate Recommendations</button>

        <!-- Resume Paste Section -->
        <div class="resume-section">
          <button id="btn-toggle-resume" class="btn-secondary">📄 Paste Resume Text</button>
          <div id="resume-container" class="hidden">
            <textarea id="resume-text" rows="5" placeholder="Paste your raw resume text here..."></textarea>
            <button id="btn-parse-resume" class="btn-primary" style="margin-top: 8px;">⚙️ Parse Resume</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading View -->
    <div id="loading-view" class="view loading-view hidden">
      <div class="spinner"></div>
      <p id="loading-text" class="loading-text">Extracting profile data...</p>
      <p class="loading-sub">Matching against 50 career paths using AI</p>
    </div>

    <!-- Error View -->
    <div id="error-view" class="view error-view hidden">
      <div class="error-icon">❌</div>
      <p id="error-message" class="error-message">An error occurred.</p>
      <button id="btn-error-back" class="btn-back">🔙 Back</button>
    </div>

    <!-- Results View -->
    <div id="results-view" class="view hidden">
      <div class="results-header">
        <h2>Your AI Matches</h2>
        <button id="btn-results-back" class="btn-back">🔙 Back to Input</button>
      </div>

      <div id="profile-summary" class="profile-summary-card">
        <!-- Summary populated via JS -->
      </div>

      <div id="job-cards">
        <!-- Job cards populated via JS -->
      </div>
    </div>
  
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>Tip: Complete your profile for better ML recommendations!</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
